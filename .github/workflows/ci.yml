name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: pytest --cov=budget --cov-fail-under=100

      - name: Run radon cyclomatic complexity check
        run: python -m radon cc budget -n B -x B

      - name: Run xenon complexity gate
        run: python -m xenon -b B budget

      - name: Run flake8
        run: flake8 budget tests

